# /etc/nginx/sites-available/pumpfun.conf
# Production Nginx reverse proxy for PumpFun
#
# Prerequisites:
#   - Certbot installed: sudo apt install certbot python3-certbot-nginx
#   - Obtain certs: sudo certbot --nginx -d your-domain.com
#   Replace 'your-domain.com' with your actual domain before use.

# ---------------------------------------------------------------------------
# Rate limiting zones (defined in the http context — place in nginx.conf or
# include this file from within an http block)
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=120r/m;

# ---------------------------------------------------------------------------
# Redirect all HTTP traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Allow ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — primary server block
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # ----- SSL (managed by Certbot — paths updated automatically) -----
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ----- Security headers -----
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: https:; \
         font-src 'self' data:; \
         connect-src 'self' https: wss:; \
         frame-ancestors 'none';"
        always;

    # ----- Gzip compression -----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ----- File upload size (token images, etc.) -----
    client_max_body_size 10M;

    # ----- Proxy settings shared by all upstream locations -----
    proxy_http_version      1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # ----- Server-Sent Events / WebSocket support -----
    # These must be set on locations that serve SSE or WS streams.
    # They are repeated explicitly in the /api/ block below.

    # ----- Static assets — long cache, no rate limiting -----
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ----- API endpoints — rate limited -----
    location /api/ {
        # Rate limit: 30 requests/minute per IP, allow burst of 10
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        # Disable buffering for SSE (Server-Sent Events) streams
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      86400s;  # Keep SSE connections alive
        proxy_send_timeout      86400s;

        # WebSocket / SSE upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://127.0.0.1:3000;
    }

    # ----- All other Next.js routes -----
    location / {
        limit_req zone=general_limit burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
    }
}

# ---------------------------------------------------------------------------
# Map for WebSocket/SSE connection upgrade
# (define once in the http block — include before the server blocks)
# ---------------------------------------------------------------------------
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
#
# NOTE: The map block above must live in nginx.conf's http { } context, not
# inside a server block.  Uncomment and move it to /etc/nginx/nginx.conf or
# a separate conf-snippet included at the http level.

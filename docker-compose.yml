services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pumpfun:${POSTGRES_PASSWORD:-pumpfun}@db:5432/pumpfun}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET to a strong random value}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-mainnet-beta}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PLATFORM_WALLET_ADDRESS: ${PLATFORM_WALLET_ADDRESS:-CfyjfkdfVchdvtKyPbBxBoScfSUPBVMwnGbYeXBs5uKw}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-1}
      GRADUATION_THRESHOLD_SOL: ${GRADUATION_THRESHOLD_SOL:-85}
      NEXT_PUBLIC_PLATFORM_FEE_BPS: ${NEXT_PUBLIC_PLATFORM_FEE_BPS:-100}
      UPLOAD_DIR: ${UPLOAD_DIR:-./public/uploads}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pumpfun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a strong random value}
      POSTGRES_DB: ${POSTGRES_DB:-pumpfun}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Port 5432 is intentionally NOT exposed to the host.
    # Connect via: docker compose exec db psql -U pumpfun
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pumpfun}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Port 6379 is intentionally NOT exposed to the host.
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
